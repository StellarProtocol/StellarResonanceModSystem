name: release
# Cut a framework release fully on CI: build the bundle against interop stubs
# (no game install), then publish bundle + the channel's version manifest to the
# public `stellar` MinIO bucket and create the GitHub release.
#
# Channels:
#   stable  -> publishes version.json AND refreshes version-testing.json as a
#              SUPERSET (this release merged onto the testing history).
#   testing -> publishes version-testing.json ONLY (a release candidate for opt-in
#              testers); version.json (stable) is left untouched.
#
# Trigger: push a tag v* (stable; a prerelease tag like v1.2.0-rc1 auto-routes to
# testing), or run manually with version + channel inputs (explicit input wins).
#
# The `build` job runs on every trigger (validation). The `publish` job is gated
# on the Production environment — configure REQUIRED REVIEWERS so a human signs
# off the real-interop / in-game smoke before a stub-built release ships. See
# docs/release-process.md § Real-interop gate.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "version to release, e.g. 1.1.0 (or 1.2.0-rc1 for a testing RC)"
        required: true
      channel:
        description: "Release channel (testing publishes version-testing.json only)"
        type: choice
        options: [stable, testing]
        default: stable

env:
  ENDPOINT: https://minio.revette.io
  BUCKET: stellar
  MIN_LAUNCHER: "1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version + channel
        id: ver
        shell: bash
        run: |
          V="${{ github.event.inputs.version }}"
          [ -n "$V" ] || V="${GITHUB_REF_NAME#v}"
          CH="${{ github.event.inputs.channel }}"
          # Tag pushes carry no channel input: a prerelease version (e.g. 1.2.0-rc1) routes to
          # testing, a plain version to stable. An explicit workflow_dispatch input always wins.
          if [ -z "$CH" ]; then case "$V" in *-*) CH=testing;; *) CH=stable;; esac; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "channel=$CH" >> "$GITHUB_OUTPUT"
          echo "resolved: version=$V channel=$CH"

      # The BepInEx IL2CPP stage (winhttp + doorstop + BepInEx/ + dotnet/, ~73 MB)
      # lives at the root of the PRIVATE stellar-release-assets repo (also
      # submoduled by the devkit at tools/BepInEx-stage). Pull it with the
      # read-only deploy key (secret RELEASE_ASSETS_SSH_KEY = private half of the
      # deploy key registered on StarResonance-Experiment/stellar-release-assets).
      - name: Fetch BepInEx stage from private release-assets repo
        uses: actions/checkout@v4
        with:
          repository: StarResonance-Experiment/stellar-release-assets
          ref: main
          ssh-key: ${{ secrets.RELEASE_ASSETS_SSH_KEY }}
          path: stage

      - name: Build bundle + version manifest(s) (against stubs)
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          CH="${{ steps.ver.outputs.channel }}"
          export STELLAR_BEPINEX_STAGE="$PWD/stage"
          bash tools/release/build-bundle.sh "$V" dist

          # Pull the current published histories so each release is APPENDED (rollback preserved).
          curl -fsS "$ENDPOINT/$BUCKET/version.json"         -o dist/prev-version.json         2>/dev/null || rm -f dist/prev-version.json
          curl -fsS "$ENDPOINT/$BUCKET/version-testing.json" -o dist/prev-version-testing.json 2>/dev/null || rm -f dist/prev-version-testing.json

          # gen <channel> <existing-history-or-""> <out>
          gen() {
            python tools/release/make_version_json.py \
              --changelog CHANGELOG.md \
              --bundle "dist/Stellar-$V.zip" \
              --bundle-url "$ENDPOINT/$BUCKET/Stellar-$V.zip" \
              --min-launcher "$MIN_LAUNCHER" \
              --version "$V" --channel "$1" \
              $([ -n "$2" ] && [ -f "$2" ] && echo "--existing $2") \
              --out "$3"
          }

          if [ "$CH" = "testing" ]; then
            # Release candidate: testing manifest ONLY (merged onto the testing history).
            # version.json (stable) is intentionally NOT produced, so publish leaves it alone.
            gen testing dist/prev-version-testing.json dist/version-testing.json
          else
            # Stable: publish version.json, and refresh version-testing.json as a SUPERSET
            # (this stable release merged onto the existing testing history — testing always
            # carries everything stable has, plus any in-flight RCs newer than latest stable).
            gen stable  dist/prev-version.json         dist/version.json
            gen testing dist/prev-version-testing.json dist/version-testing.json
          fi

      # Plugin SDK NuGets — Abstractions + PluginContracts (BCL-only) + the interop
      # reference stubs. Versioned to the framework release. Packed here (no secrets);
      # pushed to NuGet.org from the gated publish job via Trusted Publishing.
      - name: Pack plugin SDK packages
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          for p in src/Stellar.Abstractions/Stellar.Abstractions.csproj \
                   src/Stellar.PluginContracts/Stellar.PluginContracts.csproj \
                   sdk/Stellar.Plugin.InteropRefs/Stellar.Plugin.InteropRefs.csproj; do
            dotnet pack "$p" -c Release -p:Version="$V" -o dist/sdk --nologo
          done

      - uses: actions/upload-artifact@v4
        with:
          name: framework-bundle
          path: |
            dist/Stellar-*.zip
            dist/version.json
            dist/version-testing.json
            dist/sdk/*.nupkg
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: Production    # required reviewers here = the real-interop / in-game gate
    permissions:
      contents: write          # create the GitHub release
      id-token: write          # OIDC for NuGet.org Trusted Publishing (keyless)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: framework-bundle
          path: dist
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version + channel
        id: ver
        shell: bash
        run: |
          V="${{ github.event.inputs.version }}"
          [ -n "$V" ] || V="${GITHUB_REF_NAME#v}"
          CH="${{ github.event.inputs.channel }}"
          # Tag pushes carry no channel input: a prerelease version (e.g. 1.2.0-rc1) routes to
          # testing, a plain version to stable. An explicit workflow_dispatch input always wins.
          if [ -z "$CH" ]; then case "$V" in *-*) CH=testing;; *) CH=stable;; esac; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "channel=$CH" >> "$GITHUB_OUTPUT"
          echo "resolved: version=$V channel=$CH"

      - name: Upload bundle + version manifest(s) to MinIO
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: sa-east-1
          # MinIO rejects AWS CLI v2 default multipart checksums — opt out.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          # Bundle uses a version-specific object name, so stable + RC bundles coexist downloadable.
          aws s3 cp "dist/Stellar-$V.zip" "s3://$BUCKET/Stellar-$V.zip" --endpoint-url "$ENDPOINT"
          # Publish only the manifests the build produced for this channel:
          #   stable  -> version.json + version-testing.json (superset)
          #   testing -> version-testing.json only (stable version.json left untouched)
          if [ -f dist/version.json ]; then
            aws s3 cp dist/version.json "s3://$BUCKET/version.json" --endpoint-url "$ENDPOINT"
          fi
          if [ -f dist/version-testing.json ]; then
            aws s3 cp dist/version-testing.json "s3://$BUCKET/version-testing.json" --endpoint-url "$ENDPOINT"
          fi

      # GitHub Releases lifecycle:
      #   - A release candidate (testing) is a SEPARATE --prerelease release (tag v<ver>, e.g.
      #     v1.2.0-rc1). It never replaces a stable release — they coexist.
      #   - A stable release is a full release (its own tag), and ALL prior stable releases are
      #     KEPT (full history on the releases page).
      #   - Cutting a stable release DELETES every release-candidate prerelease (and its tag):
      #     the RC is gone once a real release ships.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          CH="${{ steps.ver.outputs.channel }}"
          if [ "$CH" = "testing" ]; then
            MANIFEST=dist/version-testing.json; PRE=--prerelease; SUFFIX=" (testing)"
          else
            MANIFEST=dist/version.json; PRE=""; SUFFIX=""
          fi
          gh release create "v$V" -R "$GITHUB_REPOSITORY" $PRE \
            "dist/Stellar-$V.zip" "$MANIFEST" \
            --title "StellarResonance $V$SUFFIX" \
            --notes "StellarResonance mod framework $V. Install via the launcher, or drop Stellar-$V.zip into your game's game_mini folder. AGPL-3.0; quality-of-life only, ships no game code or assets." \
            || gh release upload "v$V" -R "$GITHUB_REPOSITORY" "dist/Stellar-$V.zip" "$MANIFEST" --clobber

          if [ "$CH" != "testing" ]; then
            # A real release just shipped — remove every superseded release-candidate prerelease
            # (and its tag). Stable releases are left alone, so the releases page keeps full history.
            gh release list -R "$GITHUB_REPOSITORY" --limit 200 --json tagName,isPrerelease \
              -q '.[] | select(.isPrerelease) | .tagName' \
            | while read -r rc; do
                [ -n "$rc" ] || continue
                echo "removing superseded RC prerelease $rc"
                gh release delete "$rc" -R "$GITHUB_REPOSITORY" --cleanup-tag --yes || true
              done
          fi

      # Plugin SDK → NuGet.org via Trusted Publishing (keyless OIDC). The Trusted Publisher
      # policy on nuget.org is scoped to this repo + release.yml + the Production environment;
      # NuGet/login exchanges the job's OIDC token for a 1-hour key. No stored API key.
      - name: NuGet login (OIDC → short-lived key)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Push plugin SDK to NuGet.org
        shell: bash
        run: |
          for pkg in dist/sdk/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
