name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  standards-and-pure-layers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # L1: coding-standards gate over all of src/ (bash, no build needed).
      - name: Coding standards
        run: bash tools/check-standards.sh

      # L2/L3: build the ENTIRE solution — including Infrastructure/Host — against
      # the committed interop REFERENCE STUBS (refs/, see tools/gen-refs.sh). The
      # stubs carry the Unity/Il2Cpp/BepInEx public surface only (no method bodies,
      # no game IL/metadata, no Panda.* game logic), so this needs no game install.
      # The analyzer runs at error severity across every project here.
      # NOTE: a stub build validates the API surface, not runtime — the release-of-
      # record is gated on a real-interop / in-game smoke. See docs/release-process.md.
      - name: Build full solution against interop stubs (analyzer runs here)
        run: dotnet build src/Stellar.sln -c Release -p:GameInterop=$PWD/refs -p:BepInExCore=$PWD/refs

      # Analyzer unit tests are self-contained (no game refs) and validate the
      # enforcement rules themselves.
      - name: Analyzer tests
        run: dotnet test tests/Stellar.Analyzers.Tests/Stellar.Analyzers.Tests.csproj -c Release
