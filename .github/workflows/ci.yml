name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  standards-and-pure-layers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # L1: coding-standards gate over all of src/ (bash, no build needed).
      - name: Coding standards
        run: bash tools/check-standards.sh

      # L2/L3: the only projects that build without the game's IL2CPP interop
      # assemblies (Infrastructure/Host/samples/tests reference $(GameInterop),
      # which is proprietary and absent on CI — do NOT commit game DLLs here
      # to "fix" this; the constraint is intentional).
      - name: Build pure layers (analyzer runs here)
        run: |
          dotnet build src/Stellar.Abstractions/Stellar.Abstractions.csproj -c Release
          dotnet build src/Stellar.Wire/Stellar.Wire.csproj -c Release
          dotnet build src/Stellar.Application/Stellar.Application.csproj -c Release

      # Analyzer unit tests are self-contained (no game refs) and validate the
      # enforcement rules themselves.
      - name: Analyzer tests
        run: dotnet test tests/Stellar.Analyzers.Tests/Stellar.Analyzers.Tests.csproj -c Release
