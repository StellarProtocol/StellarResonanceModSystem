name: mirror-testing-manifest
# Reset version-testing.json to a copy of the live stable version.json (with channel="testing").
#
# Normally release.yml maintains version-testing.json on every release (stable refreshes it as a
# superset; a testing release publishes an RC into it). This workflow is a manual escape hatch:
# (re)create version-testing.json from stable WITHOUT cutting a release — e.g. to bootstrap the
# testing channel, or to reset it after a botched RC.
#
# ⚠️ DESTRUCTIVE: this OVERWRITES version-testing.json with a pure copy of stable, so it DROPS any
# in-flight release candidate currently published on the testing channel. Don't run it while an RC
# is live unless you mean to discard that RC. Same S3 secrets as release.yml.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    environment: Production    # writes to the public bucket with the prod S3 secrets
    env:
      ENDPOINT: https://minio.revette.io
      BUCKET: stellar
    steps:
      - name: Copy live version.json -> version-testing.json (channel=testing)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: sa-east-1
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          curl -fsS "$ENDPOINT/$BUCKET/version.json" -o version.json
          python3 -c "import json; d=json.load(open('version.json')); d['channel']='testing'; json.dump(d, open('version-testing.json','w'), indent=2)"
          cat version-testing.json
          aws s3 cp version-testing.json "s3://$BUCKET/version-testing.json" --endpoint-url "$ENDPOINT"
